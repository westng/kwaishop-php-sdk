name: Issue Labeled

on:
  issues:
    types:
      - labeled

permissions:
  contents: read
  issues: write

jobs:
  reply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reply For Label
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const config = JSON.parse(fs.readFileSync('.github/issue-bot/messages.json', 'utf8'));
            const issue = context.payload.issue;

            if (issue.pull_request) {
              core.info('Skip pull request payload.');
              return;
            }

            const labelName = String(context.payload.label?.name || '').toLowerCase();
            const reply = config.labelReplies[labelName];

            if (!reply) {
              core.info(`No configured reply for label: ${labelName}`);
              return;
            }

            const marker = `<!-- issue-bot:label:${labelName} -->`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100,
            });

            if (comments.some((comment) => (comment.body || '').includes(marker))) {
              core.info(`Reply for label ${labelName} already exists.`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `${marker}\n${reply}`,
            });
